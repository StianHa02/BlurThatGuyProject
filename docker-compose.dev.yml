# Development docker-compose - backend only
# Run frontend natively with: npm run dev
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DEV_MODE: "true"
      ALLOWED_ORIGINS: http://localhost:3000
      REDIS_URL: redis://redis:6379
      # TOTAL_THREAD_BUDGET: auto-detected from cpu_count() - 2
      # MAX_UPLOAD_SIZE_MB: ""  # Unlimited by default. Set to a number (e.g. "500") to enforce a limit.
    volumes:
      - ./backend:/app
      - video_uploads:/tmp/blurthatguy
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  video_uploads: