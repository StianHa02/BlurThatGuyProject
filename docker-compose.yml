services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    env_file:
      - /etc/blurthatguy.env
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - /etc/blurthatguy.env
    volumes:
      - video_uploads:/tmp/blurthatguy
    restart: unless-stopped

volumes:
  video_uploads: