<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="x-apple-disable-message-reformatting">
    <meta name="color-scheme" content="light dark">
    <meta name="supported-color-schemes" content="light dark">
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    <title>Confirm your signup</title>
    <style>
        :root {
            color-scheme: light dark;
            supported-color-schemes: light dark;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            color: #ffffff;
        }
        @media only screen and (max-width: 600px) {
            .mobile-padding { padding-left: 20px !important; padding-right: 20px !important; }
            .outer-table { width: 100% !important; }
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #070f1c; background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGNg55cBAABTADNkSArRAAAAAElFTkSuQmCC'); background-repeat: repeat;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color: #070f1c; background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGNg55cBAABTADNkSArRAAAAAElFTkSuQmCC'); background-repeat: repeat;">
        <tr>
            <td align="center" style="padding: 40px 20px;">

                <!-- Container -->
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" class="outer-table" style="max-width: 600px; width: 100%; background-color: #0d1a2d; background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGPgldIFAACMAFVDzjLbAAAAAElFTkSuQmCC'); background-repeat: repeat; border-radius: 12px; border: 1px solid #1e293b; border-collapse: separate;">

                    <!-- Header -->
                    <tr>
                        <td align="center" style="padding: 40px 40px 20px;" class="mobile-padding">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td width="32" height="32" align="center" valign="middle" style="background-color: #3b82f6; background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGOwbvoGAAKvAbS3T615AAAAAElFTkSuQmCC'); background-repeat: repeat; border-radius: 8px; font-size: 0; line-height: 0;">
                                        <!--[if !mso]><!-->
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display: block; margin: auto;">
                                            <path d="M2 2l20 20M10.37 4.91A10.92 10.92 0 0 1 12 4c7 0 10 8 10 8a18.77 18.77 0 0 1-2.45 3.53M7.33 7.33A11.02 11.02 0 0 0 2 12s3 8 10 8a10.94 10.94 0 0 0 6.67-2.33"/>
                                        </svg>
                                        <!--<![endif]-->
                                    </td>
                                    <td style="padding-left: 10px; font-size: 20px; font-weight: bold; color: #ffffff;">
                                        BlurThatGuy
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td align="center" style="padding: 0 40px 40px;" class="mobile-padding">
                            <h2 style="color: #ffffff; font-size: 24px; margin: 0 0 16px; font-weight: 700;">Confirm your signup</h2>
                            <p style="color: #94a3b8; font-size: 16px; line-height: 24px; margin: 0 0 32px;">Welcome to BlurThatGuy! Click the button below to confirm your account and start blurring faces in your videos.</p>

                            <!-- Button -->
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin: 0 auto;">
                                <tr>
                                    <td align="center" style="background-color: #3b82f6; background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGOwbvoGAAKvAbS3T615AAAAAElFTkSuQmCC'); background-repeat: repeat; border-radius: 8px;">
                                        <a href="{{ .ConfirmationURL }}" style="display: inline-block; padding: 14px 28px; color: #ffffff; font-size: 16px; font-weight: 600; text-decoration: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">Confirm your mail</a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td align="center" style="padding: 30px 40px; background-color: #0a1526; background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGPgElUDAAByAEa6PJZ9AAAAAElFTkSuQmCC'); background-repeat: repeat; border-top: 1px solid #1e293b;" class="mobile-padding">
                            <p style="font-size: 13px; color: #64748b; line-height: 20px; margin: 0;">If you didn't request this email, you can safely ignore it.</p>
                            <p style="font-size: 13px; color: #64748b; line-height: 20px; margin: 10px 0 0;">&copy; 2026 BlurThatGuy. All rights reserved.</p>
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>
</body>
</html>
