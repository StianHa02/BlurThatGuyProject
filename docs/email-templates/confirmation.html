<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="x-apple-disable-message-reformatting">
    <meta name="color-scheme" content="light dark">
    <meta name="supported-color-schemes" content="light dark">
    <title>Confirm your signup</title>
    <style>
        :root {
            color-scheme: light dark;
            supported-color-schemes: light dark;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #070f1c;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            color: #ffffff;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #0d1a2d;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1e293b;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .header {
            padding: 40px 40px 20px;
            text-align: center;
        }

        .logo-box {
            display: inline-flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background-color: #3b82f6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            margin-left: 10px;
        }

        .content {
            padding: 0 40px 40px;
            text-align: center;
        }

        h2 {
            color: #ffffff;
            font-size: 24px;
            margin: 0 0 16px;
            font-weight: 700;
        }

        p {
            color: #94a3b8;
            font-size: 16px;
            line-height: 24px;
            margin: 0 0 32px;
        }

        .btn {
            display: inline-block;
            background-color: #3b82f6;
            color: #ffffff !important;
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
        }

        .footer {
            padding: 30px 40px;
            background-color: #0a1526;
            text-align: center;
            border-top: 1px solid #1e293b;
        }

        .footer p {
            font-size: 13px;
            color: #64748b;
            margin: 0;
        }

        /* DARK MODE OVERRIDES */
        @media (prefers-color-scheme: dark) {
            body { background-color: #070f1c !important; }
            .container { background-color: #0d1a2d !important; border-color: #1e293b !important; }
            h2, .logo-text { color: #ffffff !important; }
            p { color: #94a3b8 !important; }
        }

        /* Responsive fallback */
        @media only screen and (max-width: 600px) {
            .container { margin: 0; border-radius: 0; border: none; width: 100% !important; }
            .header, .content, .footer { padding: 30px 20px; }
        }
    </style>
</head>
<body style="background-color: #070f1c;">
    <div style="background-color: #070f1c; padding: 20px 0;">
        <div class="container" style="background-color: #0d1a2d;">
            <div class="header">
                <div class="logo-box">
                    <div class="logo-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9.88 9.88L12 12M15.5 15.5l.5.5M12 12l2.12 2.12M12 12L9.88 14.12M12 12l2.12-2.12"/>
                            <path d="M2 2l20 20M10.37 4.91A10.92 10.92 0 0 1 12 4c7 0 10 8 10 8a18.77 18.77 0 0 1-2.45 3.53M7.33 7.33A11.02 11.02 0 0 0 2 12s3 8 10 8a10.94 10.94 0 0 0 6.67-2.33"/>
                        </svg>
                    </div>
                    <span class="logo-text">BlurThatGuy</span>
                </div>
            </div>
            <div class="content">
                <h2 style="color: #ffffff;">Confirm your signup</h2>
                <p style="color: #94a3b8;">Welcome to BlurThatGuy! Click the button below to confirm your account and start blurring faces in your videos.</p>
                <a href="{{ .ConfirmationURL }}" class="btn">Confirm your mail</a>
            </div>
            <div class="footer" style="background-color: #0a1526; border-top: 1px solid #1e293b;">
                <p style="color: #64748b;">If you didn't request this email, you can safely ignore it.</p>
                <p style="margin-top: 10px; color: #64748b;">&copy; 2026 BlurThatGuy. All rights reserved.</p>
            </div>
        </div>
    </div>
</body>
</html>
